kind = "web"
previewPath = "/"
title = "N.L. Swathi — Academic CV"
version = "1.0.0"
id = "artifacts/academic-cv"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24930

[services.development]
run = "pnpm --filter @workspace/academic-cv run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/academic-cv", "run", "build" ]
publicDir = "artifacts/academic-cv/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24930"
BASE_PATH = "/"
